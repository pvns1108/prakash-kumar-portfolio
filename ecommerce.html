<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Platform — Demo | Prakash Kumar</title>
<link rel="stylesheet" href="projects.css">
<style>
  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
  @media (max-width:760px){ .grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:520px){ .grid{grid-template-columns:1fr;} }
  .card{ border:1px solid var(--blue); background:var(--white); display:flex; flex-direction:column; }
  .thumb{ aspect-ratio:1/1; background:linear-gradient(135deg,var(--blue-soft),var(--blue)); position:relative; overflow:hidden; }
  .thumb span{ position:absolute; bottom:8px; left:10px; font-family:'IBM Plex Mono'; font-size:0.7rem; color:var(--paper); opacity:.8; }
  .card-body{ padding:16px; display:flex; flex-direction:column; gap:8px; flex:1; }
  .card-body h3{ font-size:1rem; color:var(--blue); }
  .price{ font-family:'IBM Plex Mono'; color:var(--ink); font-weight:600; }
  .add-btn{ margin-top:auto; }
  .cart-fab{
    position:fixed; bottom:24px; right:24px; background:var(--blue); color:var(--paper);
    border:none; border-radius:50%; width:58px; height:58px; cursor:pointer;
    font-family:'IBM Plex Mono'; font-size:0.85rem; display:flex; align-items:center; justify-content:center;
    box-shadow:3px 3px 0 var(--amber-soft); z-index:40;
  }
  .cart-panel{
    position:fixed; top:0; right:-380px; width:360px; height:100%; background:var(--paper);
    border-left:1.5px solid var(--blue); z-index:50; transition:right .25s; display:flex; flex-direction:column;
  }
  .cart-panel.open{ right:0; }
  .cart-header{ padding:20px; border-bottom:1px solid var(--paper-line); display:flex; justify-content:space-between; align-items:center; }
  .cart-items{ flex:1; overflow-y:auto; padding:14px 20px; }
  .cart-item{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--paper-line); font-size:0.88rem; }
  .cart-item .qty-ctrl{ display:flex; align-items:center; gap:6px; font-family:'IBM Plex Mono'; }
  .cart-item .qty-ctrl button{ border:1px solid var(--blue); background:none; width:22px; height:22px; cursor:pointer; }
  .cart-footer{ padding:20px; border-top:1px solid var(--paper-line); }
  .cart-footer .total-row{ display:flex; justify-content:space-between; font-family:'IBM Plex Mono'; margin-bottom:14px; }
  .empty-msg{ color:var(--slate); font-family:'IBM Plex Mono'; font-size:0.85rem; padding:20px 0; }
  .overlay{ position:fixed; inset:0; background:rgba(19,35,58,0.35); z-index:45; display:none; }
  .overlay.show{ display:block; }
</style>
</head>
<body>

<div class="demo-topbar">
  <a class="back" href="../index.html#work">← Back to portfolio</a>
  <span class="tag">DEMO · React + Node.js + MongoDB (simulated)</span>
</div>

<div class="demo-wrap">
  <div class="demo-head">
    <div class="eyebrow">Sheet 01/04 — E-Commerce Platform</div>
    <h1>Storefront Demo</h1>
    <p>A working cart: add products, adjust quantities, and see the total update live. This runs entirely in your browser — no backend needed for the demo.</p>
  </div>

  <div class="grid" id="productGrid"></div>
</div>

<button class="cart-fab" id="cartFab">🛒 <span id="cartCount" class="mono">0</span></button>
<div class="overlay" id="overlay"></div>
<aside class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h3 class="mono" style="font-size:0.95rem;">Your Cart</h3>
    <button class="btn" id="closeCart" style="padding:4px 10px;">Close</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="total-row"><span>Subtotal</span><span id="cartTotal">$0.00</span></div>
    <button class="btn primary" style="width:100%;" id="checkoutBtn">Checkout</button>
  </div>
</aside>

<script>
  const products = [
    { id:1, name:"Wireless Headphones", price:79.99 },
    { id:2, name:"Mechanical Keyboard", price:129.00 },
    { id:3, name:"Desk Lamp — Minimal", price:34.50 },
    { id:4, name:"Canvas Backpack", price:58.00 },
    { id:5, name:"Ceramic Mug Set", price:22.00 },
    { id:6, name:"Notebook — Dot Grid", price:14.00 },
  ];

  let cart = {};

  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => `
    <div class="card">
      <div class="thumb"><span class="mono">PRODUCT ${String(p.id).padStart(2,'0')}</span></div>
      <div class="card-body">
        <h3>${p.name}</h3>
        <div class="price mono">$${p.price.toFixed(2)}</div>
        <button class="btn add-btn" data-id="${p.id}">Add to cart</button>
      </div>
    </div>
  `).join('');

  grid.addEventListener('click', e => {
    if (e.target.matches('.add-btn')) {
      const id = +e.target.dataset.id;
      cart[id] = (cart[id] || 0) + 1;
      renderCart();
      openCart();
    }
  });

  const cartFab = document.getElementById('cartFab');
  const cartPanel = document.getElementById('cartPanel');
  const overlay = document.getElementById('overlay');
  const cartItems = document.getElementById('cartItems');
  const cartTotal = document.getElementById('cartTotal');
  const cartCount = document.getElementById('cartCount');

  function openCart(){ cartPanel.classList.add('open'); overlay.classList.add('show'); }
  function closeCart(){ cartPanel.classList.remove('open'); overlay.classList.remove('show'); }
  cartFab.addEventListener('click', openCart);
  document.getElementById('closeCart').addEventListener('click', closeCart);
  overlay.addEventListener('click', closeCart);

  function renderCart(){
    const ids = Object.keys(cart).filter(id => cart[id] > 0);
    if (ids.length === 0){
      cartItems.innerHTML = '<p class="empty-msg">Your cart is empty — add a product to get started.</p>';
    } else {
      cartItems.innerHTML = ids.map(id => {
        const p = products.find(p => p.id === +id);
        return `
          <div class="cart-item">
            <span>${p.name}</span>
            <div class="qty-ctrl">
              <button data-id="${id}" data-action="dec">−</button>
              <span>${cart[id]}</span>
              <button data-id="${id}" data-action="inc">+</button>
            </div>
            <span class="mono">$${(p.price * cart[id]).toFixed(2)}</span>
          </div>`;
      }).join('');
    }
    const total = ids.reduce((sum, id) => {
      const p = products.find(p => p.id === +id);
      return sum + p.price * cart[id];
    }, 0);
    cartTotal.textContent = `$${total.toFixed(2)}`;
    const count = ids.reduce((sum, id) => sum + cart[id], 0);
    cartCount.textContent = count;
  }

  cartItems.addEventListener('click', e => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.dataset.action === 'inc') cart[id]++;
    if (btn.dataset.action === 'dec') cart[id] = Math.max(0, cart[id] - 1);
    renderCart();
  });

  document.getElementById('checkoutBtn').addEventListener('click', () => {
    const total = cartTotal.textContent;
    if (total === '$0.00'){ alert('Add something to your cart first.'); return; }
    alert(`Order placed! Total: ${total}\n(This is a front-end demo — no real payment is processed.)`);
    cart = {};
    renderCart();
    closeCart();
  });

  renderCart();
</script>
</body>
</html>
